# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build .app bundle
        run: bash build.sh

      - name: Package
        run: zip -r TelegramClaude.app.zip TelegramClaude.app

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            TelegramClaude.app.zip \
            --title "TelegramClaude ${{ github.ref_name }}" \
            --notes "See README for setup instructions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
